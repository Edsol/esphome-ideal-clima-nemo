; MQTT firmware — Ideal Clima Nemo 1000 fancoil on ESP32-C3.
; Publishes state and receives commands via MQTT with Home Assistant discovery.

; Credentials live in secrets.ini (git-ignored). Copy secrets.ini.example to
; secrets.ini and fill it in. See README.md.
extra_configs = secrets.ini

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    file://../esp32            ; IdealClimaTuya library (sibling folder)
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
build_flags =
    -DWIFI_SSID=\"${secrets.wifi_ssid}\"
    -DWIFI_PASS=\"${secrets.wifi_pass}\"
    -DMQTT_HOST=\"${secrets.mqtt_host}\"
    -DMQTT_PORT=${secrets.mqtt_port}
    -DMQTT_USER=\"${secrets.mqtt_user}\"
    -DMQTT_PASS=\"${secrets.mqtt_pass}\"
