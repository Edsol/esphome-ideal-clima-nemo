; MQTT firmware — Ideal Clima Nemo 1000 fancoil on ESP32-C3.
; Publishes state and receives commands via MQTT with Home Assistant discovery.

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    file://../esp32            ; IdealClimaTuya library (sibling folder)
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
build_flags =
    -DWIFI_SSID=\"YOUR_WIFI_SSID\"
    -DWIFI_PASS=\"YOUR_WIFI_PASSWORD\"
    -DMQTT_HOST=\"192.168.1.10\"
    -DMQTT_PORT=1883
    -DMQTT_USER=\"\"
    -DMQTT_PASS=\"\"
